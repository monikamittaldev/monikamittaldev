<svg width="1000" height="300" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 300">
  <defs>
    <!-- Main background -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#0d0d0d"/>
      <stop offset="45%"  stop-color="#110a0a"/>
      <stop offset="100%" stop-color="#0a0808"/>
    </linearGradient>
    <!-- Red glow left -->
    <radialGradient id="glowL" cx="20%" cy="50%" r="45%">
      <stop offset="0%"   stop-color="#e63946" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#e63946" stop-opacity="0"/>
    </radialGradient>
    <!-- Red glow right -->
    <radialGradient id="glowR" cx="85%" cy="60%" r="40%">
      <stop offset="0%"   stop-color="#c1121f" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#c1121f" stop-opacity="0"/>
    </radialGradient>
    <!-- Name gradient MONIKA white-->
    <linearGradient id="whitegrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f0f0f0"/>
    </linearGradient>
    <!-- Name gradient MITTAL red-->
    <linearGradient id="redgrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#e63946"/>
      <stop offset="100%" stop-color="#ff4d6d"/>
    </linearGradient>
    <!-- Top/bottom bar -->
    <linearGradient id="bar" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#0d0d0d"/>
      <stop offset="30%"  stop-color="#e63946"/>
      <stop offset="70%"  stop-color="#e63946"/>
      <stop offset="100%" stop-color="#0d0d0d"/>
    </linearGradient>
    <!-- Role underline -->
    <linearGradient id="underline" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#e63946"/>
      <stop offset="100%" stop-color="#ff4d6d"/>
    </linearGradient>
    <!-- Screen glow for laptop -->
    <radialGradient id="screenGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#4488ff" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#4488ff" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- ── BACKGROUND ── -->
  <rect width="1000" height="300" fill="url(#bg)"/>
  <ellipse cx="200" cy="150" rx="350" ry="220" fill="url(#glowL)"/>
  <ellipse cx="820" cy="170" rx="280" ry="200" fill="url(#glowR)"/>

  <!-- Top accent bar -->
  <rect x="0" y="0" width="1000" height="2" fill="url(#bar)"/>
  <!-- Bottom accent bar -->
  <rect x="0" y="298" width="1000" height="2" fill="url(#bar)"/>

  <!-- Subtle grid -->
  <g stroke="#e63946" stroke-opacity="0.03" stroke-width="1">
    <line x1="0" y1="60"  x2="1000" y2="60"/>
    <line x1="0" y1="120" x2="1000" y2="120"/>
    <line x1="0" y1="180" x2="1000" y2="180"/>
    <line x1="0" y1="240" x2="1000" y2="240"/>
    <line x1="200" y1="0" x2="200" y2="300"/>
    <line x1="400" y1="0" x2="400" y2="300"/>
    <line x1="600" y1="0" x2="600" y2="300"/>
    <line x1="800" y1="0" x2="800" y2="300"/>
  </g>

  <!-- ── MM DEV LOGO (left) ── -->
  <!-- Outer circle -->
  <circle cx="90" cy="150" r="72" fill="none" stroke="#e63946" stroke-width="1.5" stroke-opacity="0.6"/>
  <!-- Inner circle -->
  <circle cx="90" cy="150" r="64" fill="#0d0d0d" stroke="#333" stroke-width="0.8"/>
  <!-- </> tag top -->
  <text x="90" y="98" font-family="monospace" font-size="11" fill="#e63946" text-anchor="middle" font-weight="bold" filter="url(#glow)">&lt;/&gt;</text>
  <!-- M M letters -->
  <text x="68" y="158" font-family="'Arial Black',Impact,sans-serif" font-size="42" font-weight="900" fill="url(#redgrad)" text-anchor="middle" filter="url(#softglow)">M</text>
  <text x="112" y="158" font-family="'Arial Black',Impact,sans-serif" font-size="42" font-weight="900" fill="#ffffff" text-anchor="middle">M</text>
  <!-- DEV text -->
  <text x="90" y="195" font-family="monospace" font-size="10" fill="#e63946" text-anchor="middle" letter-spacing="4">DEV</text>
  <!-- circle arc decoration -->
  <path d="M 30 80 A 72 72 0 0 1 150 80" fill="none" stroke="#e63946" stroke-width="1" stroke-opacity="0.3" stroke-dasharray="3,4"/>

  <!-- ── MAIN CONTENT (center-left) ── -->
  <!-- Hello eyebrow -->
  <text x="230" y="78" font-family="'Segoe UI',Arial,sans-serif" font-size="14" fill="#cccccc" letter-spacing="1">👋  Hello, I'm</text>

  <!-- MONIKA -->
  <text x="228" y="148"
    font-family="'Arial Black',Impact,sans-serif"
    font-size="62" font-weight="900"
    fill="url(#whitegrad)"
    letter-spacing="3"
    filter="url(#softglow)">MONIKA</text>

  <!-- MITTAL — shifted right of MONIKA -->
  <text x="628" y="148"
    font-family="'Arial Black',Impact,sans-serif"
    font-size="62" font-weight="900"
    fill="url(#redgrad)"
    letter-spacing="3"
    filter="url(#softglow)">MITTAL</text>

  <!-- Role underline -->
  <rect x="228" y="156" width="460" height="2" rx="1" fill="url(#underline)" opacity="0.9"/>

  <!-- FULL STACK DEVELOPER -->
  <text x="228" y="182"
    font-family="'Arial',sans-serif"
    font-size="14" font-weight="600"
    fill="#a8a8c0"
    letter-spacing="6">FULL STACK DEVELOPER</text>

  <!-- Tagline -->
  <text x="228" y="213" font-family="'Segoe UI',Arial,sans-serif" font-size="13" fill="#888888" letter-spacing="0.5">From <tspan fill="#e63946" font-weight="600">Android</tspan> to <tspan fill="#6b9fff" font-weight="600">Full Stack</tspan> —</text>
  <text x="228" y="232" font-family="'Segoe UI',Arial,sans-serif" font-size="13" fill="#888888" letter-spacing="0.5">crafting modern, scalable digital experiences.</text>

  <!-- ── SOCIAL BUTTONS ── -->
  <!-- GitHub -->
  <rect x="228" y="248" width="88" height="26" rx="5" fill="#1a1a1a" stroke="#444" stroke-width="1"/>
  <text x="272" y="265" font-family="monospace" font-size="10" fill="#cccccc" text-anchor="middle">⌨ GitHub</text>

  <!-- LinkedIn -->
  <rect x="324" y="248" width="88" height="26" rx="5" fill="#1a1a1a" stroke="#0077b5" stroke-width="1"/>
  <text x="368" y="265" font-family="monospace" font-size="10" fill="#0077b5" text-anchor="middle">in LinkedIn</text>

  <!-- Email -->
  <rect x="420" y="248" width="88" height="26" rx="5" fill="#1a1a1a" stroke="#e63946" stroke-width="1"/>
  <text x="464" y="265" font-family="monospace" font-size="10" fill="#e63946" text-anchor="middle">✉ Email</text>

  <!-- ── ANIME GIRL / RIGHT SIDE ILLUSTRATION ── -->
  <!-- Desk surface -->
  <ellipse cx="820" cy="255" rx="130" ry="18" fill="#1a0f0f" opacity="0.7"/>

  <!-- Laptop base -->
  <rect x="730" y="210" width="160" height="8" rx="3" fill="#1e1e1e" stroke="#333" stroke-width="1"/>
  <!-- Laptop screen -->
  <rect x="738" y="130" width="144" height="84" rx="6" fill="#0d1117" stroke="#2d2d2d" stroke-width="1.5"/>
  <!-- Screen glow -->
  <rect x="742" y="134" width="136" height="76" rx="4" fill="#0d1117"/>
  <ellipse cx="810" cy="172" rx="55" ry="35" fill="url(#screenGlow)"/>
  <!-- Code lines on screen -->
  <rect x="750" y="142" width="60" height="3" rx="1.5" fill="#e63946" opacity="0.8"/>
  <rect x="750" y="150" width="90" height="3" rx="1.5" fill="#4488ff" opacity="0.7"/>
  <rect x="750" y="158" width="75" height="3" rx="1.5" fill="#34d399" opacity="0.7"/>
  <rect x="750" y="166" width="50" height="3" rx="1.5" fill="#fbbf24" opacity="0.7"/>
  <rect x="750" y="174" width="85" height="3" rx="1.5" fill="#e63946" opacity="0.6"/>
  <rect x="750" y="182" width="65" height="3" rx="1.5" fill="#4488ff" opacity="0.6"/>
  <rect x="750" y="190" width="80" height="3" rx="1.5" fill="#34d399" opacity="0.5"/>
  <!-- Screen top dots -->
  <circle cx="752" cy="137" r="2" fill="#ff5f57"/>
  <circle cx="759" cy="137" r="2" fill="#ffbd2e"/>
  <circle cx="766" cy="137" r="2" fill="#28c840"/>

  <!-- Girl silhouette - head/hair -->
  <ellipse cx="860" cy="155" rx="28" ry="30" fill="#1a1015"/>
  <!-- ponytail -->
  <path d="M875 145 Q910 130 905 175 Q900 190 885 185 Q895 165 885 155 Z" fill="#1a1015"/>
  <!-- face -->
  <ellipse cx="856" cy="162" rx="20" ry="22" fill="#d4a574"/>
  <!-- hair front -->
  <path d="M836 148 Q842 130 856 128 Q870 130 878 148 Q872 140 856 138 Q840 140 836 148 Z" fill="#1a1015"/>
  <!-- headphone band -->
  <path d="M838 155 Q840 138 856 136 Q872 138 874 155" fill="none" stroke="#333" stroke-width="4" stroke-linecap="round"/>
  <circle cx="837" cy="158" r="6" fill="#2d2d2d" stroke="#444" stroke-width="1"/>
  <circle cx="875" cy="158" r="6" fill="#2d2d2d" stroke="#444" stroke-width="1"/>
  <!-- neck -->
  <rect x="849" y="182" width="14" height="18" rx="5" fill="#d4a574"/>
  <!-- body/jacket -->
  <path d="M820 200 Q830 190 848 188 L856 200 L864 188 Q882 190 892 200 L900 260 L820 260 Z" fill="#1a1a2e"/>
  <!-- jacket collar -->
  <path d="M848 188 L856 205 L864 188" fill="none" stroke="#2d2d4e" stroke-width="2"/>
  <!-- arm reaching to keyboard -->
  <path d="M892 210 Q920 220 940 218 Q945 218 945 222 Q945 226 940 226 Q915 228 888 218 Z" fill="#1a1a2e"/>
  <!-- hand on keyboard -->
  <ellipse cx="942" cy="222" rx="8" ry="5" fill="#d4a574"/>

  <!-- MUG -->
  <rect x="760" y="210" width="24" height="28" rx="4" fill="#1e1e1e" stroke="#333" stroke-width="1"/>
  <path d="M784 218 Q794 218 794 224 Q794 230 784 230" fill="none" stroke="#333" stroke-width="2"/>
  <text x="772" y="230" font-family="monospace" font-size="7" fill="#e63946" text-anchor="middle">MM</text>
  <!-- Steam -->
  <path d="M768 208 Q770 202 768 196" fill="none" stroke="#888" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
  <path d="M774 206 Q776 200 774 194" fill="none" stroke="#888" stroke-width="1.5" stroke-linecap="round" opacity="0.4"/>

  <!-- Floating code tags -->
  <rect x="920" y="90" width="52" height="28" rx="5" fill="#0d1117" stroke="#4488ff" stroke-width="1" opacity="0.8"/>
  <text x="946" y="108" font-family="monospace" font-size="12" fill="#4488ff" text-anchor="middle" font-weight="bold">&lt;/&gt;</text>

  <!-- YouTube icon -->
  <rect x="956" y="52" width="34" height="24" rx="5" fill="#1a0808" stroke="#e63946" stroke-width="1" opacity="0.7"/>
  <polygon points="966,58 966,70 978,64" fill="#e63946" opacity="0.9"/>

  <!-- MM DEV badge on right -->
  <rect x="940" y="175" width="46" height="46" rx="8" fill="#0d0d0d" stroke="#e63946" stroke-width="1.2" opacity="0.8"/>
  <text x="963" y="198" font-family="'Arial Black',sans-serif" font-size="11" font-weight="900" fill="#e63946" text-anchor="middle">MM</text>
  <text x="963" y="212" font-family="monospace" font-size="7" fill="#ffffff" text-anchor="middle" letter-spacing="2">DEV</text>

  <!-- Quote box -->
  <rect x="228" y="248" width="0" height="0" fill="none"/>

</svg>
